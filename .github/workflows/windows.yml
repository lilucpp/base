name: Windows CMake

on:
  push:
    branches: [ "master" ]
    tags: ["v*"]
  pull_request:
    branches: [ "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies via vcpkg
      run: |
        vcpkg install boost-utility boost-circular-buffer boost-stacktrace boost-locale boost-filesystem zlib gtest fmt --triplet x64-windows

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build `
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -DFMT_INSTALL=1

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j $env:NUMBER_OF_PROCESSORS

    - name: Install
      run: cmake --install ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Archive Production
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        $VERSION = $env:GITHUB_REF_NAME
        echo "Archiving version $VERSION"
        Compress-Archive -Path "${{github.workspace}}/build/PeanutBase/*" -DestinationPath "peanutbase-${VERSION}-win-x64.zip"

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: "*.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
