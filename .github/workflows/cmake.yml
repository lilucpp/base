name: CMake

on:
  push:
    tags: ["v*"] # 当你推送以 v 开头的标签（如 v1.0.0）时触发发布

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    # 授予该任务写入 Release 的权限
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install deps
      run: sudo apt-get update && sudo apt-get install -y libgtest-dev zlib1g-dev libboost-all-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} -j $(nproc)

    - name: Archive Production
      run: |
        tVERSION=${{ github.ref_name }}
        echo "Archiving version $VERSION"
        tar -czvf "my_program-${VERSION}-linux-x64.tar.gz" -C ${{github.workspace}}/build PeanutBase

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: "*.tar.gz"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}